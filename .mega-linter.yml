# CONFIGURATION
# APPLY_FIXES is intentionally off: the org's validate-go-project workflow runs a
# git-auto-commit step on MegaLinter's output, and with fixes enabled it committed
# MegaLinter's own megalinter-reports/ tree back into the branch (and dropped the
# scripts/version_diff.py exec bit). CI should report findings, not rewrite the tree.
APPLY_FIXES: none
FLAVOR_SUGGESTIONS: false
IGNORE_GITIGNORED_FILES: true
REPORTERS_MARKDOWN_SUMMARY_TYPE: sections
LINTER_RULES_PATH: .
DISABLE_LINTERS:
  # zizmor runs as a dedicated, standalone CI check (the `zizmor` job) with the
  # repo's own configuration; MegaLinter's copy is redundant and, newly
  # activated in v9.5.0, otherwise fails (it lacks GitHub API auth — it 401s on
  # github.com — and reports pre-existing workflow-audit findings the dedicated
  # check already governs).
  - ACTION_ZIZMOR
  - GO_GOLANGCI_LINT # Disabled: MegaLinter container ships an older Go than this provider requires. CI runs golangci-lint separately with the correct Go version.
  - GO_REVIVE
  # REPOSITORY_CHECKOV is ENABLED: it caught real workflow-security findings
  # (CKV2_GHA_1 least-privilege permissions), now fixed in the workflows. The
  # one publish-workflow false-gate (CKV_GHA_7 — it legitimately needs a version
  # input) is scoped-skipped in .checkov.yaml, not disabled here.
  - REPOSITORY_GITLEAKS
  - REPOSITORY_GRYPE
  # Disabled: consistent with the other dependency vulnerability scanners
  # (trivy/grype) — this repo relies on Dependabot for dependency CVE triage,
  # not a blocking MegaLinter gate.
  - REPOSITORY_OSV_SCANNER
  - REPOSITORY_SECRETLINT
  - REPOSITORY_TRIVY
  - SPELL_CSPELL

# EXCLUDE FILTERS
EXCLUDED_DIRECTORIES:
  - megalinter-reports
  - report
  - .jscpd
# Upjet generates the provider's entire API surface — Go types (apis/), controllers
# (internal/controller/), and CRDs (package/crds/) — plus the per-resource example
# manifests (examples/{cluster,namespaced}/**) and the Terraform-schema-derived config
# metadata (config/provider-metadata.yaml, config/schema.json). These are machine-managed
# (regenerated by `make generate`), so they are excluded from the repo-wide linters; the
# hand-maintained config/*.go, internal/clients/, hack/, workflow files and the
# hand-written examples/install.yaml are still linted.
FILTER_REGEX_EXCLUDE: (megalinter-reports/.*|apis/.*|internal/controller/.*|package/crds/.*|examples/(cluster|namespaced)/.*|config/provider-metadata\.yaml|config/schema\.json)
# jscpd: the generated Go (apis/, internal/) and CRDs (package/crds/) are full of
# near-identical machine-emitted blocks (controller setup, deepcopy, CRD schemas);
# copy-paste detection there is noise. jscpd runs in project mode, so the top-level
# FILTER_REGEX_EXCLUDE does not narrow its scan — pass jscpd's own --ignore globs.
COPYPASTE_JSCPD_ARGUMENTS: '--ignore "**/apis/**,**/internal/**,**/package/crds/**,**/examples/**,**/config/**,**/cmd/**,**/build/**,**/.github/workflows/**"'
# Generated CRDs (controller-gen output) are large and machine-managed; the generated
# per-resource example manifests and the Terraform-derived config metadata likewise.
# Exclude them from the YAML linters (examples/install.yaml is hand-maintained and stays
# linted).
YAML_YAMLLINT_FILTER_REGEX_EXCLUDE: (package/crds/.*|examples/(cluster|namespaced)/.*|config/.*\.yaml)
YAML_PRETTIER_FILTER_REGEX_EXCLUDE: (package/crds/.*|examples/(cluster|namespaced)/.*|config/.*\.yaml)
YAML_V8R_FILTER_REGEX_EXCLUDE: (package/crds/.*|examples/(cluster|namespaced)/.*|config/.*\.yaml)
# lychee link-checks: the workflow `run:` steps embed shell-template URLs built from
# variables (the GitHub API/repo URLs with $REPO, $COMMENTER, etc.) that are not real
# links — lychee 404s on the literal variable text. Exclude the workflows and the
# generated Terraform schema dump.
SPELL_LYCHEE_FILTER_REGEX_EXCLUDE: (\.github/workflows/.*|config/schema\.json)
